      fallback: phi3:3.8b
      models:
      - mistral:7b-instruct
      - phi3:3.8b
      - gemma2:9b
      - llama3:8b-instruct
      - qwen2:7b-instruct
      datasets: []
  anti_fraud_kyc:
    scoring_tabular:
      primary: RandomForest
      fallback: LogisticRegression
      models:
      - RandomForest
      - LogisticRegression
      - LightGBM
